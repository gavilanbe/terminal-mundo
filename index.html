<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#101317">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundo">
<title>Terminal Mundo</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#101317;          /* asfalto de pista */
  --bg2:#0B0E11;
  --tile:#1B212A;        /* flap */
  --tile-hi:#232A34;
  --ink:#EDE8DA;         /* marfil de las letras solari */
  --amber:#FFC53D;       /* ámbar de destinos */
  --ok:#37C871;
  --bad:#F25555;
  --mute:#6B7686;
  --radar:#3DDC84;
  --mono:"SF Mono", ui-monospace, "Roboto Mono", Menlo, Consolas, monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg2);
  color:var(--ink);
  font-family:var(--mono);
  min-height:100dvh;
  touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none}
svg{display:block}

/* ---------- cabecera ---------- */
header{
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
}
.hrow{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.brand{font-size:15px;font-weight:700;letter-spacing:.18em}
.brand b{color:var(--amber)}
.hsub{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.hsub small{color:var(--mute);font-size:10px;letter-spacing:.3em}
.clock{font-size:15px;font-variant-numeric:tabular-nums;color:var(--amber)}
#sndbtn{color:var(--mute);font-size:12px;padding:2px 6px;letter-spacing:.1em}
#sndbtn.on{color:var(--ink)}
/* luces de pista bajo la cabecera */
.runlights{height:4px;display:flex;gap:14px;justify-content:center;background:var(--bg);
  border-bottom:2px solid var(--amber);padding-bottom:2px}
.runlights i{width:4px;height:3px;border-radius:1px;background:var(--amber);opacity:.15;animation:chase 2.4s linear infinite}
@keyframes chase{0%,100%{opacity:.12}12%{opacity:.9}30%{opacity:.2}}

main{
  max-width:560px;margin:0 auto;
  padding:14px 14px calc(24px + env(safe-area-inset-bottom));
}

/* ---------- filas de panel ---------- */
.board{display:flex;flex-direction:column;gap:8px}
.rowbtn{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;
  background:var(--tile);
  border-radius:8px;padding:14px 14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 2px 4px rgba(0,0,0,.4);
  position:relative;overflow:hidden;text-align:left;width:100%;
  transition:transform .08s;
}
.rowbtn::after{ /* costura del flap */
  content:"";position:absolute;left:0;right:0;top:50%;height:1px;
  background:rgba(0,0,0,.45);pointer-events:none;
}
.rowbtn:active{transform:scale(.985)}
.flipin{animation:flipin .5s cubic-bezier(.2,.85,.3,1.15) both;transform-origin:top center}
@keyframes flipin{from{transform:rotateX(-70deg);opacity:0}to{transform:none;opacity:1}}
.gate{
  font-size:11px;color:var(--bg2);background:var(--amber);
  border-radius:4px;padding:3px 6px;font-weight:700;letter-spacing:.08em;
  min-width:34px;text-align:center;
}
.dest{font-size:15px;letter-spacing:.12em;font-weight:700}
.dest small{display:block;font-weight:400;font-size:10px;color:var(--mute);letter-spacing:.25em;margin-bottom:3px}
.status{font-size:10px;letter-spacing:.15em;color:var(--ok)}
.blink{animation:blink 1.2s steps(2) infinite}
@keyframes blink{50%{opacity:.25}}

/* ---------- chips de región ---------- */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;font-size:11px;letter-spacing:.12em;color:var(--mute);
  border:1px solid #2A323D;border-radius:99px;padding:7px 12px;
}
.chip.sel{color:var(--bg2);background:var(--amber);border-color:var(--amber);font-weight:700}

.secline{display:flex;justify-content:space-between;align-items:baseline;margin:16px 2px 8px}
.secline h2{font-size:11px;letter-spacing:.3em;color:var(--mute);font-weight:400}
.statstrip{
  display:flex;justify-content:space-between;gap:8px;margin-top:14px;
  font-size:11px;letter-spacing:.12em;color:var(--mute);
}
.statstrip b{color:var(--amber);font-weight:700}

/* ---------- licencia de piloto (rango) ---------- */
.rankcard{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  background:linear-gradient(135deg,#161B22,#12161C);border:1px solid #232B36;
  border-radius:10px;padding:12px 14px;margin-bottom:12px;
}
.epaul{width:54px;height:26px;background:linear-gradient(#0E1116,#151A21);border-radius:4px;
  display:flex;align-items:center;justify-content:center;gap:3px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.epaul i{width:5px;height:18px;background:linear-gradient(#FFD976,#D99A16);border-radius:1px}
.epaul .star{width:auto;height:auto;background:none;color:var(--amber);font-size:13px;font-style:normal;line-height:1}
.rankname{font-size:13px;font-weight:700;letter-spacing:.15em}
.rankname small{display:block;font-weight:400;font-size:9px;color:var(--mute);letter-spacing:.25em;margin-bottom:2px}
.ranknext{font-size:9px;color:var(--mute);letter-spacing:.1em;text-align:right}
.rankbar{width:64px;height:5px;background:#0E1116;border-radius:99px;overflow:hidden;margin-top:4px}
.rankbar i{display:block;height:100%;background:var(--amber)}

/* ---------- pantalla de pregunta ---------- */
.qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:11px;letter-spacing:.15em}
.qtop .back{color:var(--mute);padding:6px 8px 6px 0}
.alt{color:var(--amber);font-variant-numeric:tabular-nums;transition:transform .2s}
.alt.up{animation:altup .35s}
@keyframes altup{40%{transform:translateY(-4px)}}
/* ruta de vuelo */
.route{
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  background:var(--bg);border:1px solid #1E252E;border-radius:10px;
  padding:10px 12px;margin-bottom:12px;
}
.route .apt{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--mute)}
.route .apt.lit{color:var(--amber)}
.track{position:relative;height:22px}
.track .line{position:absolute;left:0;right:0;top:50%;border-top:2px dashed #2A323D}
.stops{position:absolute;inset:0;display:flex;justify-content:space-between;align-items:center}
.stops i{width:6px;height:6px;border-radius:50%;background:#2A323D}
.stops i.ok{background:var(--ok)}
.stops i.bad{background:var(--bad)}
.plane{
  position:absolute;top:50%;width:26px;color:var(--ink);
  transform:translate(-50%,-50%);transition:left .6s cubic-bezier(.3,.8,.4,1);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
}
.plane svg{width:100%;fill:currentColor}

.qcard{
  background:var(--bg);border-radius:10px;padding:18px 14px 20px;margin-bottom:14px;
  border:1px solid #1E252E;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
  position:relative;overflow:hidden;
}
.eyebrow{font-size:10px;letter-spacing:.3em;color:var(--mute);text-align:center;margin-bottom:4px}
.qlabel{font-size:12px;letter-spacing:.2em;color:var(--amber);text-align:center;margin-bottom:16px}
.flapbox{display:flex;flex-wrap:wrap;justify-content:center;gap:.35em;min-height:2.6em;position:relative;z-index:1}
.word{display:inline-flex}
.ch{
  display:inline-grid;place-items:center;
  min-width:.78em;height:1.35em;padding:0 .06em;
  font-size:clamp(19px,5.6vw,28px);font-weight:700;letter-spacing:0;
  background:linear-gradient(var(--tile-hi) 0%,var(--tile) 48%,#151A21 52%,#1D242D 100%);
  border-radius:.14em;margin:.045em;position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 1px 2px rgba(0,0,0,.5);
}
.ch::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.55)}
/* radar tras la bandera */
.radar{
  position:absolute;left:50%;top:56%;width:230px;height:230px;transform:translate(-50%,-50%);
  border-radius:50%;opacity:.14;pointer-events:none;
  background:
    repeating-radial-gradient(circle, transparent 0 34px, var(--radar) 34px 35px),
    conic-gradient(from 0deg, rgba(61,220,132,.9), transparent 70deg, transparent 360deg);
  animation:sweep 4s linear infinite;
}
@keyframes sweep{to{transform:translate(-50%,-50%) rotate(360deg)}}
.flagbig{
  display:grid;place-items:center;margin:0 auto;
  width:150px;height:118px;font-size:78px;line-height:1;
  background:linear-gradient(var(--tile-hi),var(--tile) 48%,#151A21 52%,#1D242D);
  border-radius:12px;position:relative;z-index:1;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 3px 8px rgba(0,0,0,.5);
  animation:flapdrop .45s cubic-bezier(.2,.9,.3,1.2);
  transform-origin:top center;
}
.flagbig::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.45)}
@keyframes flapdrop{from{transform:rotateX(-80deg);opacity:0}to{transform:none;opacity:1}}
.reinfo{
  text-align:center;font-size:12px;letter-spacing:.12em;color:var(--mute);
  margin-top:14px;min-height:1.2em;position:relative;z-index:1;
}
.reinfo b{color:var(--ink)}
.reinfo.show{animation:flipin .35s both}

.opts{display:flex;flex-direction:column;gap:8px}
.opt .dest{font-size:14px}
.opt .flg{font-size:20px;margin-right:2px}
.opt.ok{background:#14301F;outline:1px solid var(--ok)}
.opt.ok .status{color:var(--ok)}
.opt.bad{background:#33191B;outline:1px solid var(--bad)}
.opt.bad .gate{background:var(--bad)}
.opt.ok .gate{background:var(--ok)}
.opt.dim{opacity:.45}
.opt:disabled{cursor:default}
.shake{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.taphint{text-align:center;font-size:10px;letter-spacing:.25em;color:var(--mute);margin-top:14px;animation:blink 1.4s steps(2) infinite}

/* ---------- overlay de vuelo (despegue / aterrizaje / ascenso) ---------- */
#ovl{
  position:fixed;inset:0;z-index:50;display:none;
  background:linear-gradient(#0B0E11 0%,#12181f 55%,#151A21 100%);
  overflow:hidden;
}
#ovl.show{display:block}
.ovl-msg{
  position:absolute;left:0;right:0;top:26%;text-align:center;z-index:3;
}
.ovl-msg .eyebrow{margin-bottom:8px}
.ovl-msg h3{font-size:20px;letter-spacing:.25em;font-weight:700}
.ovl-msg h3 b{color:var(--amber)}
.cloud{
  position:absolute;width:180px;height:44px;border-radius:99px;z-index:1;
  background:radial-gradient(circle at 30% 60%, #232B36 0 40%, transparent 70%),
             radial-gradient(circle at 60% 40%, #232B36 0 45%, transparent 72%),
             radial-gradient(circle at 80% 65%, #1D242D 0 38%, transparent 70%);
  opacity:.7;animation:drift linear infinite;
}
@keyframes drift{from{transform:translateX(110vw)}to{transform:translateX(-260px)}}
.runway{
  position:absolute;left:0;right:0;bottom:0;height:96px;z-index:1;
  background:#0D1014;border-top:2px solid #232B36;
}
.runway .center{
  position:absolute;left:0;right:0;top:46px;height:6px;
  background:repeating-linear-gradient(90deg,var(--amber) 0 34px,transparent 34px 74px);
  opacity:.5;animation:roll .5s linear infinite;
}
@keyframes roll{to{background-position:-74px 0}}
.ovlplane{
  position:absolute;z-index:2;width:120px;color:#EDE8DA;left:-140px;bottom:110px;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.7));
}
.ovlplane svg{width:100%;fill:currentColor}
#ovl.takeoff .ovlplane{animation:takeoff 1.5s cubic-bezier(.55,.05,.6,.9) forwards}
@keyframes takeoff{
  0%{left:-140px;bottom:110px;transform:rotate(0deg)}
  45%{left:34vw;bottom:110px;transform:rotate(0deg)}
  100%{left:105vw;bottom:64vh;transform:rotate(-16deg)}
}
#ovl.landing .ovlplane{animation:landing 1.5s cubic-bezier(.4,.1,.7,1) forwards}
@keyframes landing{
  0%{left:-140px;bottom:64vh;transform:rotate(10deg)}
  60%{left:40vw;bottom:112px;transform:rotate(2deg)}
  100%{left:105vw;bottom:110px;transform:rotate(0deg)}
}
/* ascenso de rango */
.ovl-rank{
  position:absolute;inset:0;display:flex;flex-direction:column;gap:18px;
  align-items:center;justify-content:center;z-index:3;text-align:center;
}
.ovl-rank .epaul{margin:14px 0 22px;animation:rankin .55s cubic-bezier(.2,.9,.3,1.4) both .2s;box-shadow:0 0 46px rgba(255,197,61,.35), inset 0 1px 0 rgba(255,255,255,.06)}
@keyframes rankin{from{transform:scale(.3);opacity:0}to{transform:scale(2.2);opacity:1}}
.ovl-rank h3{font-size:22px;letter-spacing:.3em;color:var(--amber)}
.ovl-rank p{font-size:11px;letter-spacing:.25em;color:var(--mute)}

/* ---------- tarjeta de embarque (resultados) ---------- */
.pass{
  background:var(--ink);color:#20242B;border-radius:12px;overflow:hidden;
  margin-top:10px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  animation:flapdrop .5s cubic-bezier(.2,.9,.3,1.15);transform-origin:top center;
}
.pass .ptop{
  background:var(--amber);color:#20242B;padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;letter-spacing:.2em;font-weight:700;
}
.pass .proute{
  display:flex;align-items:center;gap:10px;padding:14px 16px 0;
  font-size:16px;font-weight:700;letter-spacing:.1em;
}
.pass .proute svg{width:22px;fill:#20242B;opacity:.8}
.pass .proute .dots{flex:1;border-top:2px dashed #B9B4A4;position:relative;top:1px}
.pass .proute small{font-size:9px;letter-spacing:.2em;color:#8A8676;display:block;font-weight:400}
.pass .pbody{padding:14px 16px 18px;position:relative}
.pass .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 10px}
.pass .plabel{font-size:9px;letter-spacing:.25em;color:#8A8676;margin-bottom:3px}
.pass .pval{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.pass .pval small{font-size:12px;font-weight:400}
.stamp{
  position:absolute;right:14px;top:6px;transform:rotate(-12deg);
  border:2.5px solid;border-radius:8px;padding:5px 10px;
  font-size:12px;font-weight:700;letter-spacing:.2em;
  animation:stampin .4s cubic-bezier(.2,.9,.3,1.4) both .5s;
}
@keyframes stampin{from{transform:rotate(-12deg) scale(2.6);opacity:0}to{transform:rotate(-12deg) scale(1);opacity:.88}}
.stamp.ok{color:#2E8B57;border-color:#2E8B57}
.stamp.meh{color:#B0533B;border-color:#B0533B}
.perf{border-top:2px dashed #B9B4A4;position:relative;margin:0 10px}
.barcode{
  height:44px;margin:14px 16px 16px;border-radius:2px;
  background:repeating-linear-gradient(90deg,#20242B 0 2px,transparent 2px 4px,#20242B 4px 7px,transparent 7px 8px,#20242B 8px 9px,transparent 9px 13px);
}
.resbtns{display:flex;gap:8px;margin-top:16px}
.bigbtn{
  flex:1;background:var(--tile);border-radius:8px;padding:15px;
  font-size:13px;letter-spacing:.15em;font-weight:700;text-align:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.bigbtn.amber{background:var(--amber);color:var(--bg2)}
.bigbtn:active{transform:translateY(1px)}

/* ---------- pasaporte ---------- */
.regrow{margin-bottom:14px}
.regrow .rl{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.15em;margin-bottom:5px}
.regrow .rl b{color:var(--ink)}
.regrow .rl span{color:var(--mute)}
.bar{height:8px;background:var(--tile);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--amber);border-radius:99px;transition:width .6s ease}
.flaggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:6px;margin-top:8px}
.fcell{
  font-size:24px;display:grid;place-items:center;aspect-ratio:1;
  background:var(--tile);border-radius:8px;opacity:.35;position:relative;
}
.fcell.l1{opacity:.6}.fcell.l2{opacity:.85}
.fcell.dom{opacity:1;outline:1px solid var(--amber)}
.fcell.dom::after{
  content:"✓";position:absolute;right:2px;bottom:1px;font-size:9px;
  color:var(--bg2);background:var(--amber);border-radius:50%;
  width:12px;height:12px;display:grid;place-items:center;font-weight:700;
}
#peek{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(14px + env(safe-area-inset-bottom));
  background:var(--tile);border:1px solid #2A323D;border-radius:99px;
  padding:10px 18px;font-size:13px;letter-spacing:.08em;white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:60;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#peek.show{opacity:1}
#peek b{color:var(--amber)}
#peek.sello{border-color:var(--ok);color:var(--ok)}
#peek.sello b{color:var(--ok)}
.danger{color:var(--mute);font-size:11px;letter-spacing:.15em;padding:12px;width:100%;text-align:center;margin-top:18px}
.danger.armed{color:var(--bad)}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .stamp{opacity:.88}
}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">TERMINAL <b>MUNDO</b></div>
    <div class="clock" id="clock">--:--</div>
  </div>
  <div class="hsub">
    <small>SALIDAS · DEPARTURES</small>
    <button id="sndbtn" aria-label="Sonido">♪ ON</button>
  </div>
</header>
<div class="runlights" aria-hidden="true"><i></i><i style="animation-delay:.2s"></i><i style="animation-delay:.4s"></i><i style="animation-delay:.6s"></i><i style="animation-delay:.8s"></i><i style="animation-delay:1s"></i><i style="animation-delay:1.2s"></i></div>
<main id="app"></main>
<div id="ovl" aria-hidden="true"></div>
<div id="peek" role="status"></div>

<script>
"use strict";
/* ============ DATOS · [iso, país, capital, región] ============ */
const R = {eu:"EUROPA", am:"AMÉRICA", as:"ASIA", af:"ÁFRICA", oc:"OCEANÍA"};
const RCODE = {all:"MUN", eu:"EUR", am:"AME", as:"ASI", af:"AFR", oc:"OCE"};
const DATA = [

["ES","España","Madrid","eu"],["FR","Francia","París","eu"],["PT","Portugal","Lisboa","eu"],
["AD","Andorra","Andorra la Vieja","eu"],["IT","Italia","Roma","eu"],["DE","Alemania","Berlín","eu"],
["GB","Reino Unido","Londres","eu"],["IE","Irlanda","Dublín","eu"],["BE","Bélgica","Bruselas","eu"],
["NL","Países Bajos","Ámsterdam","eu"],["LU","Luxemburgo","Luxemburgo","eu"],["CH","Suiza","Berna","eu"],
["AT","Austria","Viena","eu"],["DK","Dinamarca","Copenhague","eu"],["NO","Noruega","Oslo","eu"],
["SE","Suecia","Estocolmo","eu"],["FI","Finlandia","Helsinki","eu"],["IS","Islandia","Reikiavik","eu"],
["PL","Polonia","Varsovia","eu"],["CZ","Chequia","Praga","eu"],["SK","Eslovaquia","Bratislava","eu"],
["HU","Hungría","Budapest","eu"],["SI","Eslovenia","Liubliana","eu"],["HR","Croacia","Zagreb","eu"],
["BA","Bosnia y Herzegovina","Sarajevo","eu"],["RS","Serbia","Belgrado","eu"],["ME","Montenegro","Podgorica","eu"],
["MK","Macedonia del Norte","Skopie","eu"],["AL","Albania","Tirana","eu"],["GR","Grecia","Atenas","eu"],
["BG","Bulgaria","Sofía","eu"],["RO","Rumanía","Bucarest","eu"],["MD","Moldavia","Chisináu","eu"],
["UA","Ucrania","Kiev","eu"],["BY","Bielorrusia","Minsk","eu"],["LT","Lituania","Vilna","eu"],
["LV","Letonia","Riga","eu"],["EE","Estonia","Tallin","eu"],["RU","Rusia","Moscú","eu"],
["MT","Malta","La Valeta","eu"],["CY","Chipre","Nicosia","eu"],["MC","Mónaco","Mónaco","eu"],
["SM","San Marino","San Marino","eu"],["LI","Liechtenstein","Vaduz","eu"],["VA","Ciudad del Vaticano","Ciudad del Vaticano","eu"],
// AMÉRICA
["CA","Canadá","Ottawa","am"],["US","Estados Unidos","Washington D. C.","am"],["MX","México","Ciudad de México","am"],
["GT","Guatemala","Ciudad de Guatemala","am"],["BZ","Belice","Belmopán","am"],["HN","Honduras","Tegucigalpa","am"],

const S = load();
function load(){
  const def = {millas:0, best:0, rondas:0, region:"all", sound:true, stats:{}, lastRank:0, hints:0};
  try{
    const s = JSON.parse(localStorage.getItem("tm.state"));
    if(s && s.stats){ const m = Object.assign(def, s); m.lastRank = m.lastRank ?? rankIdx(m.millas); return m; }
  }catch(e){}
  return def;
}
function save(){ localStorage.setItem("tm.state", JSON.stringify(S)); }
const key = (iso,m)=> iso+":"+m;
const lvl = (iso,m)=> (S.stats[key(iso,m)]||0);
function bump(iso,m,ok){
  const k = key(iso,m);
  S.stats[k] = Math.max(0, Math.min(3, (S.stats[k]||0) + (ok?1:-1)));
}

/* ============ AUDIO (clacks solari, sin assets) ============ */
let AC=null;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function blip(freq,dur,type,gain,when=0){
  if(!S.sound) return;
  try{
    const c=ac(), o=c.createOscillator(), g=c.createGain(), t=c.currentTime+when;
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.start(t); o.stop(t+dur+.02);
  }catch(e){}
}
function whoosh(dur=1.2){ /* turbina: ruido filtrado con rampa */
  if(!S.sound) return;
  try{
    const c=ac(), n=c.sampleRate*dur, buf=c.createBuffer(1,n,c.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.min(1,i/(n*.4))*(1-i/n);
    const src=c.createBufferSource(); src.buffer=buf;
    const f=c.createBiquadFilter(); f.type="bandpass"; f.frequency.setValueAtTime(300,c.currentTime);
    f.frequency.exponentialRampToValueAtTime(1400,c.currentTime+dur*.7); f.Q.value=.8;
    const g=c.createGain(); g.gain.value=.12;
    src.connect(f); f.connect(g); g.connect(c.destination); src.start();
  }catch(e){}
}
const tick = ()=> blip(2400,.015,"square",.015);
const good = ()=> { blip(660,.09,"square",.05); blip(990,.14,"square",.05,.09); };
const bad  = ()=> blip(160,.22,"sawtooth",.06);
const thud = ()=> { blip(75,.15,"sine",.22); blip(2000,.02,"square",.03); };
const fanfare = ()=> { blip(523,.1,"square",.05); blip(659,.1,"square",.05,.11); blip(784,.12,"square",.05,.22); blip(1047,.25,"square",.06,.33); };

const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;
const GLYPHS = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ";
let flapTimers = [];
function clearFlaps(){ flapTimers.forEach(clearInterval); flapTimers=[]; }
function flapText(el, text){
  clearFlaps();
  el.innerHTML = "";
  let idx = 0;
  for(const word of text.toUpperCase().split(" ")){
    const w = document.createElement("span"); w.className = "word";
    for(const chr of word){
      const s = document.createElement("span"); s.className = "ch";
      w.appendChild(s);
      if(REDUCED){ s.textContent = chr; continue; }
      const spins = 3 + Math.min(10, Math.floor(idx*0.9)); // efecto ola
      let n = 0;
      const t = setInterval(()=>{
        n++;
        if(n>=spins){ s.textContent = chr; clearInterval(t); }
        else { s.textContent = GLYPHS[Math.floor(Math.random()*GLYPHS.length)]; if(n%2) tick(); }
      }, 45);
      flapTimers.push(t);
      idx++;
    }
    el.appendChild(w);
  }
}

/* ---------- ronda ---------- */
function weightOf(iso, m){
  const l = lvl(iso,m);
  return l===0 ? 4 : l===1 ? 2.5 : l===2 ? 1.2 : 0.4;
}
function pickWeighted(cands, m){
  let tot = 0; const ws = cands.map(c=>{ const w=weightOf(c[0], m); tot+=w; return w; });
  let r = Math.random()*tot;
  for(let i=0;i<cands.length;i++){ r-=ws[i]; if(r<=0) return cands[i]; }
  return cands[cands.length-1];
}
function makeQuestion(modeId, used){
  const real = modeId==="mix" ? ["flag","capital","country"][Math.floor(Math.random()*3)] : modeId;
  const cands = pool().filter(c=>!used.has(c[0]));
  const target = pickWeighted(cands, real);
  const ansText = c => real==="capital" ? c[2] : c[1];
  const others = DATA.filter(c => c[0]!==target[0] && ansText(c)!==ansText(target));
  const sameReg = others.filter(c=>c[3]===target[3]);
  const opts = [target];
  const seen = new Set([ansText(target)]);
  const src = [...sameReg];
  while(opts.length<4){
    const bag = src.length ? src : others.filter(c=>!seen.has(ansText(c)));
    if(!bag.length) break;
    const i = Math.floor(Math.random()*bag.length);
    const c = bag===src ? src.splice(i,1)[0] : bag[i];
    if(seen.has(ansText(c))) continue;
    seen.add(ansText(c)); opts.push(c);
  }
  for(let i=opts.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
  return {mode:real, target, opts, answer:opts.indexOf(target)};
}
function startRound(modeId){
  round = {modeId, n:0, hits:0, streak:0, maxStreak:0, gained:0, used:new Set(), hist:[], newDom:[]};
  const m = MODES.find(x=>x.id===modeId);
  flightScene("takeoff",
    `VUELO GEO-0${MODES.indexOf(m)+1} · DESTINO ${RCODE[S.region]}`,
    `<b>${m.n}</b> · DESPEGUE`,
    nextQuestion);
}
let advanceT = null, canAdvance = false;
function nextQuestion(){
  canAdvance = false;
  if(round.n >= QS_PER_ROUND){
    flightScene("landing", "FIN DE TRAYECTO", "<b>ATERRIZANDO</b>…", results);
    return;
  }
  round.q = makeQuestion(round.modeId, round.used);
  round.used.add(round.q.target[0]);
  round.n++;
  renderQuestion();
}
function routeHTML(){

}
function renderQuestion(){

        ? `<div class="flagbig">${flag(q.target[0])}</div>`

          <span class="gate">${"ABCD"[i]}</span>
          <span class="dest">${q.mode==="country"?`<span class="flg">${flag(c[0])}</span> `:""}${esc(txt.toUpperCase())}</span>
          <span class="status"></span>
        </button>`;
      }).join("")}
    </div>
    <div id="hint"></div>`;
  document.getElementById("back").onclick = home;
  const fx = document.getElementById("flap");
  if(fx){
    const label = q.mode==="capital" ? `${q.target[1]}` : q.target[2];
    flapText(fx, label);
    if(q.mode==="capital"){ // bandera pequeña como refuerzo
      const f = document.createElement("div");
      f.style.cssText="text-align:center;font-size:30px;margin-top:10px;position:relative;z-index:1";
      f.textContent = flag(q.target[0]);
      fx.after(f);
    }
  }
  app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>answer(+b.dataset.i));
}
function answer(i){
  clearFlaps();
  const q = round.q, ok = i===q.answer;
  const btns = [...app.querySelectorAll(".opt")];
  btns.forEach(b=>b.disabled=true);
  btns[q.answer].classList.add("ok");
  btns[q.answer].querySelector(".status").textContent = "CORRECTO";
  btns.forEach((b,j)=>{ if(j!==q.answer && j!==i) b.classList.add("dim"); });
  const wasDom = isDom(q.target[0]);
  bump(q.target[0], q.mode, ok);
  round.hist.push(ok);
  if(!wasDom && isDom(q.target[0])) round.newDom.push(q.target);
  // refuerzo: siempre el trío completo
  const info = document.getElementById("reinfo");
  info.innerHTML = `${flag(q.target[0])} <b>${esc(q.target[1].toUpperCase())}</b> · ${esc(q.target[2].toUpperCase())}`;
  info.classList.add("show");
  const altEl = document.getElementById("alt");
  if(ok){
    good();
    round.hits++; round.streak++;
    round.maxStreak = Math.max(round.maxStreak, round.streak);
    S.best = Math.max(S.best, round.streak);
    const pts = 10 + round.streak*2;
    round.gained += pts; S.millas += pts;
    altEl.textContent = `ALT ${fmt(round.streak*1000)} FT`;
    altEl.classList.add("up");
    if(navigator.vibrate) navigator.vibrate(15);
  }else{
    bad();
    round.streak = 0;
    altEl.textContent = "ALT 0 FT";
    btns[i].classList.add("bad","shake");
    btns[i].querySelector(".status").textContent = "ERROR";
    if(navigator.vibrate) navigator.vibrate([40,40,40]);
  }
  save();
  // avance: automático o tocando en cualquier sitio
  canAdvance = true;
  if(S.hints<3){
    S.hints++; save();
    document.getElementById("hint").innerHTML = `<div class="taphint">TOCA PARA CONTINUAR</div>`;
  }
  clearTimeout(advanceT);
  advanceT = setTimeout(advance, ok?1400:2400);
}
function advance(){
  if(!canAdvance) return;
  canAdvance = false;
  clearTimeout(advanceT);
  if(round.newDom.length){
    const c = round.newDom.shift();
    showPeek(`🛂 SELLO NUEVO · ${flag(c[0])} <b>${esc(c[1].toUpperCase())}</b>`, true);
    thud();
  }
  nextQuestion();
}
document.addEventListener("pointerdown", e=>{
  if(canAdvance && !e.target.closest?.(".back")) advance();
});
function results(){
  S.rondas++;
  const prevRank = S.lastRank, ri = rankIdx(S.millas);
  const rankUp = ri > prevRank;
  S.lastRank = ri; save();
  const r = round, perfect = r.hits===QS_PER_ROUND;
  const m = MODES.find(x=>x.id===r.modeId);
  app.innerHTML = `
    <div class="qtop"><button class="back" id="back">← TERMINAL</button></div>
    <div class="pass">
      <div class="ptop"><span>TARJETA DE EMBARQUE</span><span>GEO-${String(Math.floor(S.rondas)).padStart(3,"0")}</span></div>
      <div class="proute">
        <span>HUB<small>TERMINAL</small></span>
        <div class="dots"></div>
        ${PLANE}
        <div class="dots"></div>
        <span>${RCODE[S.region]}<small>${S.region==="all"?"MUNDO":R[S.region]}</small></span>
      </div>
      <div class="pbody">
        <div class="stamp ${r.hits>=7?"ok":"meh"}">${perfect?"PERFECTO":r.hits>=7?"APTO":"EN PRÁCTICAS"}</div>
        <div class="pgrid">
          <div><div class="plabel">ACIERTOS</div><div class="pval">${r.hits}<small> / ${QS_PER_ROUND}</small></div></div>
          <div><div class="plabel">MEJOR RACHA</div><div class="pval">×${r.maxStreak}</div></div>
          <div><div class="plabel">MILLAS GANADAS</div><div class="pval">+${fmt(r.gained)}</div></div>
          <div><div class="plabel">RUTA</div><div class="pval" style="font-size:13px;line-height:2">${esc(m.n)}</div></div>
        </div>
      </div>
      <div class="perf"></div>
      <div class="barcode"></div>
    </div>
    <div class="resbtns">
      <button class="bigbtn" id="toHome">TERMINAL</button>
      <button class="bigbtn amber" id="again">OTRA RONDA</button>
    </div>`;
  document.getElementById("back").onclick = home;
  document.getElementById("toHome").onclick = home;
  document.getElementById("again").onclick = ()=>startRound(r.modeId);
  setTimeout(thud, REDUCED?0:500); // el sello se estampa
  if(r.hits>=7) good();
  if(rankUp) setTimeout(()=>rankScene(ri, ()=>{}), 1400);
}

/* ---------- pasaporte ---------- */
function passport(){
  clearFlaps();
  const ri = rankIdx(S.millas);
  const regs = Object.entries(R).map(([id,name])=>{
    const cs = DATA.filter(c=>c[3]===id);
    const dom = cs.filter(c=>isDom(c[0])).length;
    return {id,name,cs,dom};
  });
  app.innerHTML = `
    <div class="qtop"><button class="back" id="back">← TERMINAL</button><span class="prog">PASAPORTE</span><span></span></div>
    <div class="rankcard">
      ${epaulHTML(ri)}
      <div class="rankname"><small>LICENCIA DE PILOTO</small>${RANKS[ri][1]}</div>
      <div class="ranknext">RONDAS <b style="color:var(--amber)">${S.rondas}</b></div>
    </div>
    <div class="statstrip" style="margin:2px 2px 18px">
      <span>MILLAS <b>${fmt(S.millas)}</b></span>
      <span>RÉCORD <b>×${S.best}</b></span>
      <span>SELLOS <b>${DATA.filter(c=>isDom(c[0])).length}</b></span>
    </div>
    ${regs.map(r=>`
      <div class="regrow">
        <div class="rl"><b>${r.name}</b><span>${r.dom} / ${r.cs.length} DOMINADOS</span></div>
        <div class="bar"><i style="width:${r.cs.length?Math.round(100*r.dom/r.cs.length):0}%"></i></div>
        <div class="flaggrid">${r.cs.map(c=>{
          const s = domScore(c[0]);
          const cls = isDom(c[0])?"dom": s>=5?"l2": s>=2?"l1":"";
          return `<button class="fcell ${cls}" data-iso="${c[0]}">${flag(c[0])}</button>`;
        }).join("")}</div>
      </div>`).join("")}
    <button class="danger" id="reset">BORRAR PROGRESO</button>`;
  document.getElementById("back").onclick = home;
  app.querySelectorAll(".fcell").forEach(b=>b.onclick=()=>{
    const c = DATA.find(x=>x[0]===b.dataset.iso);
    showPeek(`${flag(c[0])} <b>${esc(c[1])}</b> · ${esc(c[2])}`);
  });
  const rst = document.getElementById("reset");
  rst.onclick = ()=>{
    if(rst.classList.contains("armed")){
      S.millas=0; S.best=0; S.rondas=0; S.stats={}; S.lastRank=0; save(); passport();
    }else{
      rst.classList.add("armed");
      rst.textContent = "PULSA OTRA VEZ PARA CONFIRMAR";
      setTimeout(()=>{ rst.classList.remove("armed"); rst.textContent="BORRAR PROGRESO"; }, 2500);
    }
  };
}

/* ============ RELOJ / SONIDO / SW ============ */
function tickClock(){
  const d = new Date();
  document.getElementById("clock").textContent =
    String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
tickClock(); setInterval(tickClock, 15000);

const sndbtn = document.getElementById("sndbtn");
function paintSnd(){ sndbtn.textContent = S.sound?"♪ ON":"♪ OFF"; sndbtn.classList.toggle("on",S.sound); }
sndbtn.onclick = ()=>{ S.sound=!S.sound; save(); paintSnd(); if(S.sound) tick(); };
paintSnd();

if("serviceWorker" in navigator && location.protocol!=="file:"){
  addEventListener("load", ()=>navigator.serviceWorker.register("sw.js"));
}

home();
</script>
</body>
</html>
